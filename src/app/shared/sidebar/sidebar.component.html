<div class="sidebar">

  <div class="logo">
    <img src="assets/logo.png" alt="Liceo Creatives Logo">
  </div>

  <div class="motivation">
    <span>Stay Creative!</span>
    <small>Keep pushing your limits today.</small>
  </div>

  <div class="menu">

    <p class="section-title">PERSONAL</p>

    <a routerLink="/my-tasks" routerLinkActive="active">
      <svg class="icon" viewBox="0 0 24 24">
        <rect x="6" y="4" width="12" height="16" rx="2"></rect>
        <line x1="9" y1="8" x2="15" y2="8"></line>
      </svg>
      <span>My Tasks</span>
    </a>

    <p class="section-title">WORKFLOW</p>

    <a routerLink="/production" routerLinkActive="active">
      <svg class="icon" viewBox="0 0 24 24">
        <line x1="4" y1="6" x2="20" y2="6"></line>
        <line x1="4" y1="12" x2="20" y2="12"></line>
        <line x1="4" y1="18" x2="20" y2="18"></line>
      </svg>
      <span>Production Board</span>
    </a>

    <a routerLink="/submit" routerLinkActive="active">
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M12 16V4"></path>
        <path d="M8 8l4-4 4 4"></path>
        <rect x="4" y="16" width="16" height="4" rx="1"></rect>
      </svg>
      <span>Submit Work</span>
    </a>

    <a routerLink="/assignments" routerLinkActive="active">
      <svg class="icon" viewBox="0 0 24 24">
        <rect x="5" y="5" width="14" height="14" rx="2"></rect>
        <path d="M8 12l2 2 4-4"></path>
      </svg>
      <span>Assignments</span>
    </a>

  </div>

  <!-- 🔥 USER -->
  <div class="user" routerLink="/profile" routerLinkActive="active">

    <img *ngIf="profileImage; else noPhoto" [src]="profileImage" />

    <ng-template #noPhoto>
      <div class="avatar-placeholder">
        {{ name ? name.charAt(0).toUpperCase() : '👤' }}
      </div>
    </ng-template>

    <div class="user-info">
      <div class="name">{{ name || 'Your Name' }}</div>
      <div class="role">{{ formatRole(role) || 'Your Role' }}</div>
    </div>

  </div>

</div>
