<div class="page">
  <h2 class="tasks-title">Upload & <span>Submit Work</span></h2>

  <div class="main-layout">

    <!-- LEFT PANEL -->
    <div class="left-panel">
      <div class="card submit-card">

        <div class="field">
      <label>Select Task</label>
      <select [(ngModel)]="selectedTaskId">
        <option [ngValue]="null" disabled>Choose a task</option>
        <option *ngFor="let task of tasks" [ngValue]="task.id">
          {{ task.title }} ({{ task.department }})
        </option>
      </select>
    </div>

        <!-- GOOGLE DRIVE ONLY -->
        <div class="field">
          <label>Google Drive Link</label>
          <input [(ngModel)]="driveLink" placeholder="Paste Google Drive link here">
        </div>

        <!-- NOTES -->
        <div class="field">
          <label>Notes</label>
          <textarea [(ngModel)]="notes" placeholder="Any notes for the reviewer..."></textarea>
        </div>

        <button type="button" class="btn-primary full" (click)="submitWork()">
          Submit for Review
        </button>

      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

      <!-- READY FOR REVIEW -->
      <div class="workflow-section"
           (dragover)="$event.preventDefault()"
           (drop)="onDrop($event, 'review')">

        <div class="section-header">
          <h3>Ready for Review</h3>
        </div>

        <div class="section-content">
          <div class="workflow-card"
               *ngFor="let item of reviewList"
               draggable="true"
               (dragstart)="onDragStart($event, item)">

            <div class="card-top">
              <strong>Submission #{{ item.id }}</strong>
              <span class="status review">Needs Review</span>
            </div>

            <div class="card-body">
              <a [href]="item.drive_link" target="_blank">View File</a>
            </div>

            <div class="card-actions">
              <button class="done-btn"
                      (click)="updateStatus(item.id!, 'approved')">
                Approve
              </button>
            </div>

          </div>
        </div>
      </div>

      <!-- READY TO POST -->
      <div class="workflow-section"
           (dragover)="$event.preventDefault()"
           (drop)="onDrop($event, 'approved')">

        <div class="section-header">
          <h3>Ready to Post</h3>
        </div>

        <div class="section-content">
          <div class="workflow-card done"
               *ngFor="let item of approvedList"
               draggable="true"
               (dragstart)="onDragStart($event, item)">

            <div class="card-top">
              <strong>Submission #{{ item.id }}</strong>
              <span class="status done">Approved</span>
            </div>

            <div class="card-body">
              <a [href]="item.drive_link" target="_blank">View File</a>
            </div>

            <div class="card-actions">
              <button class="done-btn"
                      (click)="markAsDone(item.id!)">
                Mark as Done
              </button>
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>
</div>
