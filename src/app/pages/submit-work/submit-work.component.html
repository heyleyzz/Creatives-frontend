<div class="page">
  <h2 class="tasks-title">Upload & <span>Submit Work</span></h2>

  <div class="main-layout">

    <!-- LEFT PANEL -->
    <div class="left-panel">
      <div class="card submit-card">

        <!-- TASK SELECTOR -->
        <div class="field">
          <label>Select Task</label>
          <select [(ngModel)]="selectedTaskId">
            <option [value]="null" disabled>Choose a task</option>
            <option *ngFor="let task of tasks" [value]="task.id">
              {{ task.title }} ({{ task.department }})
            </option>
          </select>
        </div>

        <!-- GOOGLE DRIVE LINK -->
        <div class="field">
          <label>Google Drive Link</label>
          <input [(ngModel)]="driveLink" placeholder="Paste Google Drive link here">
        </div>

        <!-- NOTES -->
        <div class="field">
          <label>Notes</label>
          <textarea [(ngModel)]="notes" placeholder="Any notes for the reviewer..."></textarea>
        </div>

        <button type="button" class="btn-primary full" (click)="submitWork()">
          Submit for Review
        </button>

      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

      <!-- REVIEW -->
      <div class="workflow-section">
        <div class="section-header"><h3>Ready for Review</h3></div>
        <div class="section-content">
          <div class="workflow-card" *ngFor="let item of reviewList">
            <div class="card-top">
              <strong>Task #{{ item.task_id }}</strong>
              <span class="status review">Needs Review</span>
            </div>
            <div class="card-actions">
              <button class="done-btn" (click)="updateStatus(item.id!, 'approved')">
                Approve
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- APPROVED -->
      <div class="workflow-section">
        <div class="section-header"><h3>Ready to Post</h3></div>
        <div class="section-content">
          <div class="workflow-card done" *ngFor="let item of approvedList">
            <div class="card-top">
              <strong>Task #{{ item.task_id }}</strong>
              <span class="status done">Approved</span>
            </div>
            <div class="card-actions">
              <button class="done-btn" (click)="markAsDone(item.id!)">
                Mark as Done
              </button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
