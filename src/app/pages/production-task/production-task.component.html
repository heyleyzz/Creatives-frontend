<div class="board">

  <!-- PENDING -->
  <div class="column">
    <div class="column-header">
      <span class="dot pending"></span>
      <h3>Pending</h3>
      <span class="count">{{ pending.length }}</span>
    </div>

    <div
      cdkDropList
      id="pendingList"
      [cdkDropListData]="pending"
      [cdkDropListConnectedTo]="['pendingList','inProgressList','completeList']"
      class="task-list"
      (cdkDropListDropped)="drop($event)"
    >
      <div class="card pending-card" *ngFor="let task of pending" cdkDrag>
        {{ task.title }}
      </div>
    </div>
  </div>

  <!-- IN PROGRESS -->
  <div class="column">
    <div class="column-header">
      <span class="dot progress"></span>
      <h3>In Progress</h3>
      <span class="count">{{ inProgress.length }}</span>
    </div>

    <div
      cdkDropList
      id="inProgressList"
      [cdkDropListData]="inProgress"
      [cdkDropListConnectedTo]="['pendingList','inProgressList','completeList']"
      class="task-list"
      (cdkDropListDropped)="drop($event)"
    >
      <div class="card progress-card" *ngFor="let task of inProgress" cdkDrag>
        {{ task.title }}
      </div>
    </div>
  </div>

  <!-- COMPLETE -->
  <div class="column">
    <div class="column-header">
      <span class="dot complete"></span>
      <h3>Complete</h3>
      <span class="count">{{ complete.length }}</span>
    </div>

    <div
      cdkDropList
      id="completeList"
      [cdkDropListData]="complete"
      [cdkDropListConnectedTo]="['pendingList','inProgressList','completeList']"
      class="task-list"
      (cdkDropListDropped)="drop($event)"
    >
      <div class="card complete-card" *ngFor="let task of complete" cdkDrag>
        {{ task.title }}
      </div>
    </div>
  </div>

</div>

<!-- PERFORMANCE CHART -->
<div class="performance-section">
  <div class="performance-header">
    <h3>Performance Overview</h3>
    <p>Task Status Overview</p>
  </div>

  <canvas id="performanceChart"></canvas>
</div>
