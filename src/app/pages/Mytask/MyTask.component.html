<div class="container">

  <!-- HEADER -->
  <div class="top-bar">
    <div>
      <h2 class="tasks-title">
        My <span>Tasks</span>
      </h2>
      <p class="sub">Stay on track and manage your work</p>
    </div>
  </div>

  <!-- EMPTY STATE -->
  <div class="empty-state" *ngIf="tasks.length === 0">

    <div class="empty-card"> <!-- ✅ NEW WRAPPER -->

      <div class="empty-icon">
        <svg viewBox="0 0 24 24" fill="none">
          <rect x="5" y="3" width="14" height="18" rx="3"
            stroke="#8b0000" stroke-width="1.6"/>

          <circle cx="9" cy="9" r="1.2" fill="#8b0000"/>
          <line x1="11" y1="9" x2="16" y2="9"
            stroke="#8b0000" stroke-width="1.6" stroke-linecap="round"/>

          <circle cx="9" cy="13" r="1.2" fill="#8b0000"/>
          <line x1="11" y1="13" x2="16" y2="13"
            stroke="#8b0000" stroke-width="1.6" stroke-linecap="round"/>

          <circle cx="9" cy="17" r="1.2" fill="#8b0000"/>
          <line x1="11" y1="17" x2="16" y2="17"
            stroke="#8b0000" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </div>

      <h3 class="empty-title">No tasks yet</h3>
      <p class="empty-sub">
        You're all set! Add tasks to start organizing your workflow.
      </p>

    </div>

  </div>

  <!-- TASK CARDS -->
  <div class="task-grid" *ngIf="tasks.length > 0">

    <div 
      class="task-card"
      *ngFor="let task of tasks"
      [class.done]="task.isDone"
    >

      <!-- LEFT -->
      <div class="left">
        <input 
          type="checkbox"
          [checked]="task.isDone"
          (change)="toggleDone(task)"
        />

        <div class="info">
          <h3>{{ task.title }}</h3>

          <p class="date">
            <span class="date-icon">
              <svg viewBox="0 0 24 24" fill="none">
                <rect x="3" y="5" width="18" height="16" rx="3"
                  stroke="#8b0000" stroke-width="1.5"/>

                <line x1="3" y1="9" x2="21" y2="9"
                  stroke="#8b0000" stroke-width="1.5"/>

                <line x1="8" y1="3" x2="8" y2="7"
                  stroke="#8b0000" stroke-width="1.5" stroke-linecap="round"/>

                <line x1="16" y1="3" x2="16" y2="7"
                  stroke="#8b0000" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>

            {{ task.dueDate }}
          </p>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="right">
        <span class="badge">{{ task.department }}</span>
      </div>

    </div>

  </div>

</div>
