<div class="profile-wrapper">

  <!-- HEADER -->
  <div class="profile-header">
    <h2 class="tasks-title">
  My <span>Profile</span>
</h2>
    <button type="button" class="logout-btn" (click)="logout()">Logout</button>
  </div>

  <!-- CARD -->
  <div class="profile-card">

    <!-- 🔥 PROFILE TOP -->
    <div class="profile-top">

      <!-- AVATAR -->
      <div class="avatar-section">

        <!-- ✅ IMAGE -->
        <img *ngIf="imagePreview; else noPhoto"
             [src]="imagePreview"
             class="avatar" />

        <!-- ❌ PLACEHOLDER -->
        <ng-template #noPhoto>
          <div class="avatar-placeholder">
            {{ name ? name.charAt(0).toUpperCase() : '👤' }}
          </div>
        </ng-template>

        <!-- FILE INPUT -->
        <input type="file" hidden #fileInput (change)="onFileSelected($event)">

        <button type="button" (click)="fileInput.click()" class="upload-btn">
          Change Photo
        </button>

      </div>

      <!-- 🔥 NAME + ROLE -->
      <div class="user-text">
        <div class="name-role">
          <h3>{{ name || 'Your Name' }}</h3>
          <span class="dot">•</span>
          <p class="role">{{ formatRole(role) || 'Your Role' }}</p>
        </div>
      </div>

    </div>

    <!-- 🔥 FORM SECTION -->
    <div class="form-section">

      <form>

        <!-- ROW -->
        <div class="row">

          <div class="input-group">
            <label>First Name</label>
            <input type="text" name="firstName" [(ngModel)]="firstName">
          </div>

          <div class="input-group">
            <label>Last Name</label>
            <input type="text" name="lastName" [(ngModel)]="lastName">
          </div>

        </div>

        <!-- EMAIL -->
        <div class="input-group">
          <label>Email</label>
          <input type="email" name="email" [(ngModel)]="email">
        </div>

        <!-- BIO -->
        <div class="input-group">
          <label>Bio</label>
          <textarea name="bio" [(ngModel)]="bio"></textarea>
        </div>

        <!-- ACTIONS -->
        <div class="actions">

          <button type="button" class="save-btn" (click)="saveProfile()">
            Save Changes
          </button>

          <p *ngIf="showSuccess" class="success-msg">
            ✅ Profile saved successfully!
          </p>

          <button
            type="button"
            class="settings-btn"
            (click)="activeTab = 'settings'">
            Open Settings
          </button>

        </div>

      </form>

    </div>

  </div>

  <!-- SETTINGS -->
  <div *ngIf="activeTab === 'settings'" class="settings-container">
    <app-settings></app-settings>
  </div>

</div>
