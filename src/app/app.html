<ng-container *ngIf="!auth.isLoggedIn(); else mainLayout">

  <!-- LOGIN ONLY (FULL SCREEN) -->
  <router-outlet></router-outlet>

</ng-container>

<ng-template #mainLayout>

  <!-- MAIN APP WITH SIDEBAR -->
  <div class="layout">
    <app-sidebar></app-sidebar>

    <div class="main-content">
      <router-outlet></router-outlet>
    </div>
  </div>

</ng-template>
